<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sansilcolor</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
    background:#f1f5f9;
    color:#0f172a;
    font-family:'Segoe UI', sans-serif;
}
.sidebar{
    width:230px;
    height:100vh;
    position:fixed;
    background:#ffffff;
    padding:20px;
    border-right:1px solid #e2e8f0;
}
.sidebar h4{
    font-weight:700;
    margin-bottom:30px;
}
.sidebar a{
    display:block;
    color:#475569;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
    text-decoration:none;
}
.sidebar a:hover{
    background:#e2e8f0;
    color:#0f172a;
}
.main{
    margin-left:250px;
    padding:20px;
}
.card{
    background:#ffffff;
    border:none;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
}
input{
    border-radius:10px !important;
}
.btn-primary{
    background:#2563eb;
    border:none;
    border-radius:10px;
}
.table{
    color:#0f172a;
}

/* MOBILE */
@media(max-width: 768px){
    .sidebar{
        position:relative;
        width:100%;
        height:auto;
        display:flex;
        overflow-x:auto;
    }
    .sidebar a{
        flex:1;
        text-align:center;
        font-size:12px;
    }
    .main{
        margin-left:0;
    }
}
</style>
</head>

<body>

<div class="sidebar">
    <h4>Sansilcolor</h4>
    <a href="#"><i class="bi bi-speedometer2"></i><br>Dashboard</a>
    <a href="#"><i class="bi bi-plus-circle"></i><br>Cadastrar</a>
    <a href="#"><i class="bi bi-search"></i><br>Buscar</a>
    <a href="#"><i class="bi bi-box-arrow-right"></i><br>Sair</a>
</div>

<div class="main">

<div class="row mb-4">
    <div class="col">
        <h3>Dashboard</h3>
        <p class="text-secondary">Sistema de Colorimetria Automotiva</p>
    </div>
</div>

<div class="row g-3 mb-4">
    <div class="col-12 col-md-4">
        <div class="card p-3">
            <h6>Total Veículos</h6>
            <h2>120</h2>
        </div>
    </div>
    <div class="col-12 col-md-4">
        <div class="card p-3">
            <h6>Consultas Hoje</h6>
            <h2>35</h2>
        </div>
    </div>
</div>

<div class="card p-4 mb-4">
    <h5 class="mb-3">Cadastrar Veículo</h5>

    <div class="row g-2">
        <div class="col-6 col-md-2">
            <input class="form-control" placeholder="Placa">
        </div>
        <div class="col-6 col-md-3">
            <input class="form-control" placeholder="Modelo">
        </div>
        <div class="col-6 col-md-2">
            <input class="form-control" placeholder="Marca">
        </div>
        <div class="col-6 col-md-2">
            <input class="form-control" placeholder="Cor">
        </div>
        <div class="col-6 col-md-2">
            <input class="form-control" placeholder="Código">
        </div>
        <div class="col-6 col-md-1 d-grid">
            <button class="btn btn-primary">+</button>
        </div>
    </div>
</div>

<div class="card p-4">
    <h5>Buscar Veículo</h5>

    <input class="form-control mb-3" placeholder="Digite placa ou modelo">

    <div class="table-responsive">
        <table class="table align-middle">
            <thead>
                <tr>
                    <th>Placa</th>
                    <th>Modelo</th>
                    <th>Cor</th>
                    <th>Código</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>ABC1234</td>
                    <td>Gol</td>
                    <td>Prata</td>
                    <td>LY7W</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</div>

</body>
</html>
